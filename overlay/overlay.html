<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>F1 Focus Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .overlay {
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(0, 161, 155, 0.3);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(10px);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 11px;
      color: #04BFAD;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .status {
      font-size: 9px;
      color: #8a8a9a;
    }

    .status .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #04BFAD;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .main {
      display: flex;
      gap: 16px;
      flex: 1;
      align-items: center;
    }

    /* Focus Ring */
    .focus-ring {
      position: relative;
      width: 120px;
      height: 120px;
      flex-shrink: 0;
    }

    .focus-ring svg {
      transform: rotate(-90deg);
    }

    .focus-ring .score {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .focus-ring .score .number {
      font-size: 28px;
      font-weight: 700;
      color: #04BFAD;
      font-family: 'Consolas', monospace;
    }

    .focus-ring .score .label {
      font-size: 8px;
      color: #04BFAD;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* Stats */
    .stats {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(30, 32, 40, 0.8);
    }

    .stat-row .label {
      font-size: 9px;
      color: #8a8a9a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-row .value {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      font-family: 'Consolas', monospace;
    }

    .stat-row .unit {
      font-size: 9px;
      color: #565F64;
      margin-left: 2px;
    }

    .footer {
      margin-top: 8px;
      font-size: 8px;
      color: #565F64;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="header">
      <h1>F1 Focus Monitor</h1>
      <span class="status"><span class="dot"></span>Live</span>
    </div>

    <div class="main">
      <!-- Focus Score Ring -->
      <div class="focus-ring">
        <svg width="120" height="120">
          <circle cx="60" cy="60" r="50" stroke="#1e2028" stroke-width="6" fill="none"/>
          <circle id="progress-ring" cx="60" cy="60" r="50" stroke="#04BFAD" stroke-width="6" fill="none"
            stroke-linecap="round"
            stroke-dasharray="314"
            stroke-dashoffset="31"
            style="filter: drop-shadow(0 0 4px rgba(4, 191, 173, 0.5))"/>
        </svg>
        <div class="score">
          <span class="number" id="focus-score">92</span>
          <span class="label">Focus</span>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-row">
          <span class="label">Speed</span>
          <span><span class="value" id="speed">285</span><span class="unit">km/h</span></span>
        </div>
        <div class="stat-row">
          <span class="label">Steering</span>
          <span><span class="value" id="steering">-4.5</span><span class="unit">°</span></span>
        </div>
        <div class="stat-row">
          <span class="label">Throttle</span>
          <span><span class="value" id="throttle">87</span><span class="unit">%</span></span>
        </div>
        <div class="stat-row">
          <span class="label">Lap Time</span>
          <span><span class="value" id="laptime">1:10.2</span></span>
        </div>
      </div>
    </div>

    <div class="footer">Ctrl+Shift+F to hide • Ctrl+Shift+G to click-through</div>
  </div>

  <script>
    // Poll backend for real-time data
    const API_URL = 'http://localhost:5000'

    async function updateData() {
      try {
        // Get latest telemetry from active session
        const res = await fetch(`${API_URL}/api/health`)
        if (!res.ok) return

        // For now, poll predict/single with last known data
        // In production, this connects to the live telemetry stream
      } catch (e) {
        // Backend not available
      }
    }

    // Update every 500ms
    setInterval(updateData, 500)

    // Update focus ring based on score
    function updateFocusRing(score) {
      const ring = document.getElementById('progress-ring')
      const circumference = 2 * Math.PI * 50 // radius = 50
      const offset = circumference - (score / 100) * circumference
      ring.setAttribute('stroke-dashoffset', offset)

      // Change color based on score
      let color = '#04BFAD'
      if (score < 80) color = '#f5a623'
      if (score < 50) color = '#e74c3c'
      ring.setAttribute('stroke', color)
      document.getElementById('focus-score').style.color = color
    }

    // Demo: simulate changing values (replace with real API data)
    function simulateUpdate() {
      const score = Math.floor(75 + Math.random() * 23)
      const speed = Math.floor(180 + Math.random() * 130)
      const steering = (Math.random() * 40 - 20).toFixed(1)
      const throttle = Math.floor(60 + Math.random() * 40)

      document.getElementById('focus-score').textContent = score
      document.getElementById('speed').textContent = speed
      document.getElementById('steering').textContent = steering
      document.getElementById('throttle').textContent = throttle
      updateFocusRing(score)
    }

    setInterval(simulateUpdate, 1000)
    simulateUpdate()
  </script>
</body>
</html>
